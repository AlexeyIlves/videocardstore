<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GPU Store — Cart</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <a href="index.html" class="logo">GPU Store</a>
      <a href="index.html" class="btn-secondary" style="padding:8px 12px;border-radius:6px">← На главную</a>
    </header>

    <h1>Your Cart</h1>
    <p>Here are the items you have selected.</p>

    <div id="cartList" class="cart-list"></div>

    <footer>
      <div id="cartTotal" class="price">Total: 0 ₽</div>
      <div style="display:flex;gap:12px">
        <a href="index.html" class="btn-secondary" style="padding:10px 14px;border-radius:8px">Continue Shopping</a>
        <a href="checkout.html" class="btn btn-primary">Proceed to Checkout</a>
      </div>
    </footer>
  </div>
  <script src="js/cart.js"></script>
</body>
</html>
