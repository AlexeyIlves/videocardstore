<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Placing an order — GPU Store
  </title>

  <meta
    name="description"
    content="Placing an order at GPU Store"
  >

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>

<body>

  <div class="container">

    <!-- =========================
         HEADER
    ========================== -->

    <header>

      <a
        href="index.html"
        class="logo"
      >
        GPU Store
      </a>

      <nav>

        <a href="index.html">
          Main Page
        </a>

        <a href="catalog.html">
          Catalog
        </a>

        <a href="cart.html">
          Cart
        </a>

      </nav>

    </header>

    <!-- =========================
         PAGE TITLE
    ========================== -->

    <section class="section">

      <h1>
        Placing an order
      </h1>

      <p class="muted">
        Fill in the delivery details
      </p>

    </section>

    <!-- =========================
         CHECKOUT
    ========================== -->

    <section
      class="product"
      style="
        grid-template-columns:
        1fr 380px;
      "
    >

      <!-- FORM -->

      <div>

        <form id="checkoutForm">

          <!-- NAME -->

          <div style="margin-bottom:18px">

            <label for="name">
              Name
            </label>

            <input
              id="name"
              type="text"
              placeholder="Ваше имя"
              required
            >

          </div>

          <!-- PHONE -->

          <div style="margin-bottom:18px">

            <label for="phone">
              Phone Number
            </label>

            <input
              id="phone"
              type="tel"
              placeholder="+381 (999) 000-00-00"
              required
            >

          </div>

          <!-- EMAIL -->

          <div style="margin-bottom:18px">

            <label for="email">
              Email
            </label>

            <input
              id="email"
              type="email"
              placeholder="example@email.com"
              required
            >

          </div>

          <!-- ADDRESS -->

          <div style="margin-bottom:18px">

            <label for="address">
              Delivery Address
            </label>

            <input
              id="address"
              type="text"
              placeholder="Город, улица, дом"
              required
            >

          </div>

          <!-- DELIVERY -->

          <div style="margin-bottom:18px">

            <label for="delivery">
              Delivery Method
            </label>

            <select id="delivery">

              <option>
                Courier Delivery
              </option>

              <option>
                Pickup by yourself
              </option>

              <option>
                Pickup Point
              </option>

            </select>

          </div>

          <!-- PAYMENT -->

          <div style="margin-bottom:24px">

            <label for="payment">
              Payment Method
            </label>

            <select id="payment">

              <option>
                Credit Card
              </option>

              <option>
                Cash on Delivery
              </option>

              <option>
                PayPal
              </option>

            </select>

          </div>

          <!-- SUBMIT -->

          <button
            type="submit"
            class="btn btn-primary"
          >
            Submit
          </button>

        <button
            id="submitOrderBtn"
            type="submit"
            class="btn btn-primary"
        >
            Submit Order
        </button>

        </form>

      </div>

      <!-- ORDER SUMMARY -->

      <aside class="card">

        <h2 style="margin-top:0">
          Order Summary
        </h2>

        <div
          id="checkoutItems"
          style="
            display:flex;
            flex-direction:column;
            gap:14px;
            margin-top:20px;
          "
        ></div>

        <div
          style="
            margin-top:24px;
            padding-top:20px;
            border-top:1px solid #e5e7eb;
          "
        >

          <div
            style="
              display:flex;
              justify-content:space-between;
              margin-bottom:10px;
            "
          >

            <span class="muted">
              Merchandise Total
            </span>

            <span id="itemsTotal">
              0 ₽
            </span>

          </div>

          <div
            style="
              display:flex;
              justify-content:space-between;
              margin-bottom:10px;
            "
          >

            <span class="muted">
              Delivery
            </span>

            <span>
              Free
            </span>

          </div>

          <div
            style="
              display:flex;
              justify-content:space-between;
              font-size:24px;
              font-weight:800;
            "
          >

            <span>
              Total
            </span>

            <span id="finalTotal">
              0 ₽
            </span>

          </div>

        </div>

      </aside>

    </section>

  </div>

  <!-- =========================
       SCRIPT
  ========================== -->

  <script src="js/checkout.js"></script>

</body>
</html>
