<!DOCTYPE html>
<html lang="ru">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Каталог видеокарт — GPU Store
  </title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>

<body>

  <div class="container">

    <!-- =========================
         HEADER
    ========================== -->

    <header>

      <a
        href="index.html"
        class="logo"
      >
        GPU Store
      </a>

      <nav>

        <a href="index.html">
          Главная
        </a>

        <a href="catalog.html">
          Каталог
        </a>

        <a href="cart.html">
          Корзина
        </a>

        <button
          class="btn btn-primary"
          id="cartBtn"
        >

          Корзина

          <span
            id="cartCount"
            class="cart-badge"
          >
            0
          </span>

        </button>

      </nav>

    </header>

    <!-- =========================
         PAGE TITLE
    ========================== -->

    <section class="section">

      <h1>
        Каталог видеокарт
      </h1>

      <p class="muted">

        Подберите GPU для игр,
        рендера, AI и рабочих задач

      </p>

    </section>

    <!-- =========================
         MAIN CONTENT
    ========================== -->

    <main>

      <!-- FILTERS -->

      <aside class="filters">

        <h2>
          Фильтры
        </h2>

        <form id="filtersForm">

          <!-- BRAND -->

          <label for="brand">
            Бренд
          </label>

          <select
            id="brand"
            name="brand"
          >

            <option value="all">
              Все
            </option>

            <option value="nvidia">
              NVIDIA
            </option>

            <option value="amd">
              AMD
            </option>

          </select>

          <!-- MEMORY -->

          <label
            for="memory"
            style="margin-top:16px;display:block"
          >
            Память
          </label>

          <select
            id="memory"
            name="memory"
          >

            <option value="all">
              Все
            </option>

            <option value="8gb">
              8 GB
            </option>

            <option value="12gb">
              12 GB
            </option>

            <option value="16gb">
              16 GB
            </option>

            <option value="24gb">
              24 GB
            </option>

          </select>

          <!-- SORT -->

          <label
            for="sort"
            style="margin-top:16px;display:block"
          >
            Сортировка
          </label>

          <select
            id="sort"
            name="sort"
          >

            <option value="price-asc">
              Цена ↑
            </option>

            <option value="price-desc">
              Цена ↓
            </option>

          </select>

          <!-- SUBMIT -->

          <button
            type="submit"
            class="btn btn-primary"
            style="margin-top:20px;width:100%"
          >
            Применить
          </button>

        </form>

      </aside>

      <!-- PRODUCTS -->

      <section
        class="products grid"
        id="catalogProducts"
      ></section>

    </main>

    <!-- =========================
         FOOTER
    ========================== -->

    <footer>

      <div class="footer-grid">

        <div>

          <div
            style="
              font-weight:800;
              margin-bottom:10px;
            "
          >
            GPU Store
          </div>

          <div class="muted">

            Интернет-магазин
            видеокарт и комплектующих

          </div>

        </div>

        <div>

          <div
            style="
              font-weight:700;
              margin-bottom:10px;
            "
          >
            Навигация
          </div>

          <div class="muted">

            Главная<br>
            Каталог<br>
            Корзина

          </div>

        </div>

        <div>

          <div
            style="
              font-weight:700;
              margin-bottom:10px;
            "
          >
            Контакты
          </div>

          <div class="muted">

            support@gpustore.com<br>
            +7 (900) 000-00-00

          </div>

        </div>

      </div>

    </footer>

  </div>

  <!-- =========================
       SCRIPTS
  ========================== -->

  <script src="js/products.js"></script>

  <script src="js/catalog.js"></script>

</body>
</html>
